<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CronPilot — Visual Crontab Manager</title>
  <meta name="description" content="A beautiful desktop app for managing your local crontab. No Docker, no Node.js — just install and use." />
  <style>
    :root {
      --bg: #fafafa;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --emerald: #059669;
      --emerald-bg: #ecfdf5;
      --radius: 10px;
      --header-bg: rgba(250,250,250,0.85);
    }
    html.dark {
      --bg: #0f1117;
      --card: #1a1d27;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #2d3040;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --emerald: #34d399;
      --emerald-bg: #064e3b22;
      --header-bg: rgba(15,17,23,0.85);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

    /* Top Header */
    .top-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .top-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }
    .app-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
    }
    .app-brand svg { width: 24px; height: 24px; color: var(--primary); }
    .app-brand span {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .switcher-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .switcher-btn:hover {
      background: var(--border);
      color: var(--text);
    }
    .switcher-btn svg { width: 16px; height: 16px; }
    .lang-btn {
      width: auto;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 600;
      gap: 4px;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 72px 0 48px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--emerald-bg);
      color: var(--emerald);
      font-size: 13px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 span { color: var(--primary); }
    .hero-tagline {
      font-size: 22px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 18px;
      color: var(--muted);
      max-width: 520px;
      margin: 0 auto 36px;
    }
    .hero-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--border); }
    .btn svg { width: 18px; height: 18px; }

    /* Features */
    .features {
      padding: 48px 0 64px;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .feature-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .feature-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 14px;
    }
    .feature-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .feature-card p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Tech */
    .tech {
      padding: 0 0 64px;
      text-align: center;
    }
    .tech h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .tech-tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .tech-tag {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    /* Platforms */
    .platforms {
      padding: 0 0 64px;
      text-align: center;
    }
    .platforms h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .platforms > p {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 28px;
    }
    .platform-cards {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .platform-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 36px;
      text-align: center;
      min-width: 180px;
    }
    .platform-card .icon { font-size: 32px; margin-bottom: 10px; }
    .platform-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .platform-card p { font-size: 13px; color: var(--muted); }

    /* Footer */
    footer {
      text-align: center;
      padding: 32px 0;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 640px) {
      .hero { padding: 48px 0 32px; }
      .hero h1 { font-size: 32px; }
      .hero p { font-size: 16px; }
      .features-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Top Header with App Name + Switchers -->
  <header class="top-header">
    <div class="container">
      <a class="app-brand" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>CronPilot</span>
      </a>
      <div class="header-actions">
        <button class="switcher-btn lang-btn" id="langBtn" onclick="toggleLang()" title="Switch language">EN</button>
        <button class="switcher-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-badge">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span data-i18n="badge"></span>
      </div>
      <h1><span>CronPilot</span></h1>
      <p class="hero-tagline" data-i18n="heroTagline"></p>
      <p data-i18n="heroDesc"></p>
      <div class="hero-buttons">
        <a href="https://github.com/lifedever/CronPilot/releases/latest" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span data-i18n="download"></span>
        </a>
        <a href="https://github.com/lifedever/CronPilot" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </a>
      </div>
    </section>

    <!-- Features (6 cards, removed: Bilingual, Dark Mode, Auto Update) -->
    <section class="features">
      <div class="features-grid">
        <div class="feature-card">
          <div class="feature-icon">&#128736;</div>
          <h3 data-i18n="f1Title"></h3>
          <p data-i18n="f1Desc"></p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#128197;</div>
          <h3 data-i18n="f2Title"></h3>
          <p data-i18n="f2Desc"></p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#9889;</div>
          <h3 data-i18n="f3Title"></h3>
          <p data-i18n="f3Desc"></p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#128260;</div>
          <h3 data-i18n="f4Title"></h3>
          <p data-i18n="f4Desc"></p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#128737;</div>
          <h3 data-i18n="f5Title"></h3>
          <p data-i18n="f5Desc"></p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">&#128202;</div>
          <h3 data-i18n="f9Title"></h3>
          <p data-i18n="f9Desc"></p>
        </div>
      </div>
    </section>

    <!-- Tech Stack -->
    <section class="tech">
      <h2 data-i18n="techTitle"></h2>
      <div class="tech-tags">
        <span class="tech-tag">Tauri v2</span>
        <span class="tech-tag">Rust</span>
        <span class="tech-tag">React 19</span>
        <span class="tech-tag">TypeScript</span>
        <span class="tech-tag">Vite 6</span>
        <span class="tech-tag">Tailwind CSS v4</span>
        <span class="tech-tag">SQLite</span>
      </div>
    </section>

    <!-- Platforms -->
    <section class="platforms">
      <h2 data-i18n="platformTitle"></h2>
      <p data-i18n="platformDesc"></p>
      <div class="platform-cards">
        <div class="platform-card">
          <div class="icon">&#63743;</div>
          <h3>macOS</h3>
          <p data-i18n="platformMac"></p>
        </div>
      </div>
    </section>
  </div>

  <footer>
    <div class="container">
      <p data-i18n="footerLicense"></p>
      <p style="margin-top: 4px;" data-i18n-html="footerMade"></p>
    </div>
  </footer>

  <script>
    const i18n = {
      en: {
        badge: "Open Source & Free",
        heroTagline: "Manage Crontab Visually",
        heroDesc: "A lightweight, beautiful desktop app for managing your local crontab jobs. No Docker, no Node.js server — just install and use.",
        download: "Download",
        f1Title: "Visual CRUD",
        f1Desc: "Create, edit, delete, and toggle cron jobs with a clean UI. No more crontab -e.",
        f2Title: "Cron Expression Builder",
        f2Desc: "Quick presets, real-time validation, human-readable description, and next 5 execution previews.",
        f3Title: "Run & Monitor",
        f3Desc: "Execute any job instantly and see stdout, stderr, exit code, and duration in real time.",
        f4Title: "Import & Sync",
        f4Desc: "One-click import from existing crontab. Changes sync to system crontab automatically.",
        f5Title: "Command Validation",
        f5Desc: "Checks if the executable exists and warns about dangerous commands before saving.",
        f9Title: "Dashboard",
        f9Desc: "Overview of total jobs, active count, recent executions, and failure alerts at a glance.",
        techTitle: "Built With",
        platformTitle: "Available Platforms",
        platformDesc: "CronPilot manages the system crontab, currently available for macOS.",
        platformMac: ".dmg installer<br/>Intel & Apple Silicon",
        footerLicense: "CronPilot is open source under the MIT License.",
        footerMade: 'Made with &#10084;&#65039; by <a href="https://github.com/lifedever">lifedever</a>',
      },
      zh: {
        badge: "开源免费",
        heroTagline: "可视化 Crontab 管理工具",
        heroDesc: "一款轻量美观的桌面应用，可视化管理本地 crontab 定时任务。无需 Docker、无需 Node.js，安装即用。",
        download: "下载",
        f1Title: "可视化管理",
        f1Desc: "通过简洁的界面创建、编辑、删除和启用/禁用定时任务，告别 crontab -e。",
        f2Title: "Cron 表达式构建器",
        f2Desc: "快捷预设、实时校验、人类可读描述，以及未来 5 次执行时间预览。",
        f3Title: "执行与监控",
        f3Desc: "一键立即执行任务，实时查看 stdout、stderr、退出码和耗时。",
        f4Title: "导入与同步",
        f4Desc: "一键导入现有 crontab 任务，修改自动同步到系统 crontab。",
        f5Title: "命令校验",
        f5Desc: "保存前自动检测脚本是否可执行，识别危险命令并警告。",
        f9Title: "仪表盘",
        f9Desc: "一目了然查看任务总数、活跃数量、最近执行记录和失败告警。",
        techTitle: "技术栈",
        platformTitle: "支持平台",
        platformDesc: "CronPilot 管理系统 crontab，目前支持 macOS。",
        platformMac: ".dmg 安装包<br/>Intel 和 Apple Silicon",
        footerLicense: "CronPilot 基于 MIT 协议开源。",
        footerMade: '由 <a href="https://github.com/lifedever">lifedever</a> 用 &#10084;&#65039; 打造',
      }
    };

    let currentLang = "en";
    let currentTheme = "light";

    const sunIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    const moonIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

    function applyLang(lang) {
      currentLang = lang;
      const t = i18n[lang] || i18n.en;
      document.documentElement.lang = lang;
      document.title = lang === "zh" ? "CronPilot — 可视化 Crontab 管理工具" : "CronPilot — Visual Crontab Manager";
      document.querySelector('meta[name="description"]').content = t.heroDesc;

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key] != null) el.innerHTML = t[key];
      });
      document.querySelectorAll("[data-i18n-html]").forEach(el => {
        const key = el.getAttribute("data-i18n-html");
        if (t[key] != null) el.innerHTML = t[key];
      });

      document.getElementById("langBtn").textContent = lang === "zh" ? "中" : "EN";
    }

    function applyTheme(theme) {
      currentTheme = theme;
      if (theme === "dark") {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
      document.getElementById("themeBtn").innerHTML = theme === "dark" ? sunIcon : moonIcon;
    }

    function toggleLang() {
      applyLang(currentLang === "en" ? "zh" : "en");
    }

    function toggleTheme() {
      applyTheme(currentTheme === "light" ? "dark" : "light");
    }

    // Auto-detect language
    const isZh = (navigator.language || navigator.userLanguage || "").startsWith("zh");
    applyLang(isZh ? "zh" : "en");

    // Auto-detect theme
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(prefersDark ? "dark" : "light");
  </script>
</body>
</html>
