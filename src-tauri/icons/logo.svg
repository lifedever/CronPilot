<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="clock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8edf5"/>
    </linearGradient>
    <linearGradient id="hand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>

  <!-- Clock face -->
  <circle cx="512" cy="490" r="280" fill="url(#clock)" filter="url(#shadow)"/>

  <!-- Hour markers -->
  <!-- 12 -->
  <rect x="500" y="230" width="24" height="48" rx="12" fill="#1e40af" opacity="0.9"/>
  <!-- 3 -->
  <rect x="744" y="478" width="48" height="24" rx="12" fill="#1e40af" opacity="0.9"/>
  <!-- 6 -->
  <rect x="500" y="702" width="24" height="48" rx="12" fill="#1e40af" opacity="0.9"/>
  <!-- 9 -->
  <rect x="232" y="478" width="48" height="24" rx="12" fill="#1e40af" opacity="0.9"/>

  <!-- Small tick marks -->
  <!-- 1 -->
  <rect x="620" y="255" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(30 628 271)"/>
  <!-- 2 -->
  <rect x="713" y="355" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(60 721 371)"/>
  <!-- 4 -->
  <rect x="713" y="605" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(120 721 621)"/>
  <!-- 5 -->
  <rect x="620" y="698" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(150 628 714)"/>
  <!-- 7 -->
  <rect x="388" y="698" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(210 396 714)"/>
  <!-- 8 -->
  <rect x="295" y="605" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(240 303 621)"/>
  <!-- 10 -->
  <rect x="295" y="355" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(300 303 371)"/>
  <!-- 11 -->
  <rect x="388" y="255" width="16" height="32" rx="8" fill="#1e40af" opacity="0.35" transform="rotate(330 396 271)"/>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="512" y1="490" x2="380" y2="350" stroke="#1e3a5f" stroke-width="28" stroke-linecap="round" filter="url(#innerShadow)"/>

  <!-- Minute hand (pointing to ~2) -->
  <line x1="512" y1="490" x2="640" y2="320" stroke="#1e3a5f" stroke-width="20" stroke-linecap="round" filter="url(#innerShadow)"/>

  <!-- Center dot -->
  <circle cx="512" cy="490" r="18" fill="#1e40af"/>
  <circle cx="512" cy="490" r="8" fill="#fff"/>

  <!-- Compass/pilot arrow at bottom right - navigation element -->
  <g transform="translate(650, 640) rotate(-45)">
    <path d="M0,-55 L18,30 L0,15 L-18,30 Z" fill="#f59e0b" stroke="#fff" stroke-width="4" opacity="0.95"/>
  </g>

  <!-- Cron asterisks decoration - subtle -->
  <text x="512" y="870" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#ffffff" opacity="0.85" letter-spacing="8">* * * * *</text>
</svg>
