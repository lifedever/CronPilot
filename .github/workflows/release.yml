name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Rust compile cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend once
        run: pnpm build

      - name: Run tests
        run: cd src-tauri && cargo test

      - name: Build macOS Assets
        run: node scripts/release.mjs
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: "cronpilot2026"

      - name: Create Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${{ github.ref_name }}"

          gh release create "$tag_name" \
            --title "CronPilot $tag_name" \
            --notes "## Download

          | File | Architecture |
          |------|-------------|
          | \`CronPilot_*_aarch64.dmg\` | Apple Silicon |
          | \`CronPilot_*_x64.dmg\` | Intel Mac |

          ## Installation (macOS)

          Since this app is not notarized by Apple, macOS may show a security warning on first launch.
          Run the following command in Terminal:

          \`\`\`bash
          sudo xattr -rd com.apple.quarantine /Applications/CronPilot.app
          \`\`\`

          ---

          由于此应用未经 Apple 公证，首次打开可能提示\"无法验证开发者\"。请在终端执行：

          \`\`\`bash
          sudo xattr -rd com.apple.quarantine /Applications/CronPilot.app
          \`\`\`

          执行后即可正常打开。" \
            || echo "Release already exists, uploading assets..."

          find src-tauri/target -name "*.dmg" -exec gh release upload "$tag_name" {} --clobber \;
          find src-tauri/target -name "*_aarch64.app.tar.gz" -exec gh release upload "$tag_name" {} --clobber \;
          find src-tauri/target -name "*_x86_64.app.tar.gz" -exec gh release upload "$tag_name" {} --clobber \;
          gh release upload "$tag_name" latest.json --clobber
